<script>
  // ----- Horizontal drag-scroll & wheel-scroll for frames grids -----
  document.querySelectorAll('.frames-grid').forEach(grid => {
    let isDown = false;
    let startX, scrollLeft;

    // Click and drag to scroll — but NOT when starting from inside a phone mockup
    grid.addEventListener('mousedown', (e) => {
      // Don't hijack: interactive elements, OR anything inside a phone (so phones can scroll/interact)
      if (e.target.closest('button, input, textarea, a, .phone')) return;
      isDown = true;
      startX = e.pageX - grid.offsetLeft;
      scrollLeft = grid.scrollLeft;
      grid.style.scrollBehavior = 'auto';
    });
    grid.addEventListener('mouseleave', () => { isDown = false; });
    grid.addEventListener('mouseup', () => { isDown = false; });
    grid.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - grid.offsetLeft;
      const walk = (x - startX) * 1.5;
      grid.scrollLeft = scrollLeft - walk;
    });

    // Convert vertical mouse wheel to horizontal scroll — but NOT over a phone
    grid.addEventListener('wheel', (e) => {
      // Don't hijack wheel inside a phone — let the phone content scroll naturally
      if (e.target.closest('.phone')) return;
      // If user is already scrolling horizontally (shift+wheel, or trackpad), let it pass
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
      // Only hijack vertical wheel if the grid is scrollable horizontally
      if (grid.scrollWidth > grid.clientWidth) {
        e.preventDefault();
        grid.scrollLeft += e.deltaY;
      }
    }, { passive: false });
  });

  // ----- Language toggle -----
  const toggle = document.querySelectorAll('.lang-toggle button, .tn-lang button');
  toggle.forEach(btn => {
    btn.addEventListener('click', () => {
      const lang = btn.dataset.lang;
      toggle.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      document.querySelectorAll('[data-en]').forEach(el => {
        const val = el.dataset[lang];
        if (val === undefined) return;
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
          el.value = val;
        } else {
          el.innerHTML = val;
        }
      });
      document.documentElement.lang = lang;
    });
  });

  // ----- Collapsible sections -----
  document.querySelectorAll('.collapsible-section > .section-header').forEach(header => {
    header.addEventListener('click', () => {
      const section = header.parentElement;
      section.classList.toggle('collapsed');
      // If Section 03 was just expanded, redraw the flow arrows now that
      // node positions are measurable.
      if (section.classList.contains('section-03-collapsible') &&
          !section.classList.contains('collapsed')) {
        // Allow layout to settle
        requestAnimationFrame(() => {
          if (typeof drawFlowArrows === 'function') drawFlowArrows();
        });
      }
    });
  });

  // ----- Messages: identity collapse/expand inside ALL ITEMS section -----
  document.querySelectorAll('.msg-id-collapse-head').forEach(head => {
    head.addEventListener('click', (e) => {
      e.preventDefault();
      const block = head.parentElement;
      const expanded = block.getAttribute('data-expanded') !== 'false';
      block.setAttribute('data-expanded', expanded ? 'false' : 'true');
    });
  });

  // ----- Home feed: auto-hide search on scroll -----
  document.querySelectorAll('.allfree-screen').forEach(screen => {
    const phoneScreen = screen.parentElement;
    const header = screen.querySelector('.af-top-header');
    if (!phoneScreen || !header) return;
    phoneScreen.addEventListener('scroll', () => {
      if (phoneScreen.scrollTop > 24) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    }, { passive: true });
  });

  // ----- Top-nav tab switching -----
  (function() {
    const panels = document.querySelectorAll('.tab-panel');
    const links = document.querySelectorAll('[data-tab-link]');

    function showTab(name) {
      let found = false;
      panels.forEach(p => {
        const match = p.dataset.tab === name;
        p.classList.toggle('active', match);
        if (match) found = true;
      });
      if (!found) {
        // Fall back to "thanks" if hash doesn't match anything
        panels.forEach(p => p.classList.toggle('active', p.dataset.tab === 'thanks'));
        name = 'thanks';
      }
      links.forEach(l => {
        // Brand link doesn't get the .active highlight even though it points to "all"
        if (l.classList.contains('tn-brand')) return;
        l.classList.toggle('active', l.dataset.tabLink === name);
      });
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
    }

    // Click handler — intercept and use hash
    links.forEach(l => {
      l.addEventListener('click', (e) => {
        const target = l.dataset.tabLink;
        if (!target) return;
        e.preventDefault();
        if (location.hash !== '#' + target) {
          try {
            history.pushState(null, '', '#' + target);
          } catch (err) {
            // about:srcdoc and some sandboxed iframes don't allow pushState — fall back to direct hash assignment
            try { location.hash = target; } catch (e2) { /* nothing more we can do */ }
          }
        }
        showTab(target);
      });
    });

    // Back/forward navigation
    window.addEventListener('hashchange', () => {
      const name = location.hash.replace('#', '') || 'thanks';
      showTab(name);
    });

    // Initial load — respect the hash
    const initial = location.hash.replace('#', '') || 'thanks';
    showTab(initial);
  })();

  // ----- Flow Map: draw connecting arrows between nodes -----
  function drawFlowArrows() {
    const canvas = document.querySelector('.flow-map-canvas');
    const svg = document.querySelector('.flow-arrows');
    if (!canvas || !svg) return;

    // Hide if grid collapsed (mobile)
    if (window.matchMedia('(max-width: 1100px)').matches) {
      svg.innerHTML = svg.querySelector('defs').outerHTML;
      return;
    }

    // Connections defined as pairs of frame numbers
    const connections = [
      // Auth flow
      { from: '2.1.5', to: '2.1.6' },
      { from: '2.1.6', to: '2.1.1' },

      // Main nav (dashed = bottom-bar tab switching)
      { from: '2.1.1', to: '2.1.2', dashed: true },
      { from: '2.1.1', to: '2.1.3a', dashed: true },
      { from: '2.1.1', to: '2.1.4b', dashed: true },

      // Profile → own management (now 2.2.3 = My Items Personal, 2.2.4 = My Items Business)
      { from: '2.1.4a', to: '2.2.3' },
      { from: '2.1.4b', to: '2.2.3' },
      { from: '2.1.4b', to: '2.2.4' },
      { from: '2.1.4b', to: '2.2.5' },
      { from: '2.1.4a', to: '2.2.5' },
      { from: '2.1.4c', to: '2.3.3' },
      { from: '2.1.4b', to: '2.1.4d' },

      // Manage → Add (now 2.2.5 = Manage Biz, 2.2.6 = Add Biz)
      { from: '2.2.5', to: '2.2.6' },
      { from: '2.3.3', to: '2.3.4' },

      // Discovery: home / leaderboard / messages → public profiles
      { from: '2.1.1', to: '2.2.1' },
      { from: '2.1.1', to: '2.2.2' },
      { from: '2.1.2', to: '2.2.1' },
      { from: '2.1.3a', to: '2.3.1' },
      { from: '2.1.3a', to: '2.3.2' },

      // Public profiles + home → item detail
      { from: '2.1.1', to: '2.4.1' },
      { from: '2.2.1', to: '2.4.1' },
      { from: '2.2.2', to: '2.4.1' },

      // Item detail → claim confirmed
      { from: '2.4.1', to: '2.4.2' },

      // Own management → submit + claimants (now 2.2.7 = Submit 1, 2.2.8 = Submit 2)
      { from: '2.2.3', to: '2.2.7' },
      { from: '2.2.4', to: '2.2.7' },
      { from: '2.2.7', to: '2.2.8' },
      { from: '2.2.3', to: '2.4.3' },
      { from: '2.2.4', to: '2.4.3' },

      // After pickup → thanks
      { from: '2.4.2', to: '2.2.9' },
    ];

    // Resize the SVG to fill canvas
    const cRect = canvas.getBoundingClientRect();
    svg.setAttribute('viewBox', `0 0 ${cRect.width} ${cRect.height}`);
    svg.setAttribute('width', cRect.width);
    svg.setAttribute('height', cRect.height);

    // Helper to find a node by frame number (the second segment after "frame-")
    function findNode(num) {
      const a = canvas.querySelector(`a.flow-node[href="#frame-${num}"]`);
      return a ? a.querySelector('.mini-screen') : null;
    }

    // Get rect relative to canvas
    function relRect(el) {
      const r = el.getBoundingClientRect();
      return {
        left: r.left - cRect.left,
        right: r.right - cRect.left,
        top: r.top - cRect.top,
        bottom: r.bottom - cRect.top,
        cy: (r.top + r.bottom) / 2 - cRect.top,
      };
    }

    // Clear any existing paths
    svg.querySelectorAll('path').forEach(p => p.remove());

    // Draw a curved path from right edge of "from" node to left edge of "to" node
    connections.forEach(({ from, to, dashed }) => {
      const a = findNode(from);
      const b = findNode(to);
      if (!a || !b) return;

      const ra = relRect(a);
      const rb = relRect(b);

      // Determine if a is to left of b (forward) or to right (backward)
      const goingForward = ra.right < rb.left;

      let x1, y1, x2, y2;
      if (goingForward) {
        x1 = ra.right + 2;
        y1 = ra.cy;
        x2 = rb.left - 4;
        y2 = rb.cy;
      } else {
        // Same column or backward — connect bottom to top, or use side curve
        x1 = ra.right + 2;
        y1 = ra.cy;
        x2 = rb.left - 4;
        y2 = rb.cy;
      }

      const dx = x2 - x1;
      const cp1x = x1 + Math.max(40, Math.abs(dx) * 0.45);
      const cp1y = y1;
      const cp2x = x2 - Math.max(40, Math.abs(dx) * 0.45);
      const cp2y = y2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`);
      if (dashed) path.classList.add('dashed');
      svg.appendChild(path);
    });
  }

  // Draw on load + on resize
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', drawFlowArrows);
  } else {
    drawFlowArrows();
  }
  window.addEventListener('resize', () => {
    clearTimeout(window._flowArrowsTimer);
    window._flowArrowsTimer = setTimeout(drawFlowArrows, 120);
  });
</script>
</body>
</html>
